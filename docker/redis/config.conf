# ======================================================================
# REDIS PERFORMANCE-OPTIMIZED CONFIGURATION
# ======================================================================

# Disable protected mode for containerized environments.
# Protected mode is a security feature that requires binding Redis
# to a trusted network interface, but in Docker, I usually disable it
# to allow external connections.
protected-mode no

# Bind to all interfaces within Docker containers. In production,
# I suggest restricting this for security or using Docker's network settings.
bind 0.0.0.0

# Set a higher frequency for internal operations such as closing
# connections or evicting expired keys. Default is 10; increased to 100
# for lower latency and better responsiveness.
hz 100

# ======================================================================
# PERSISTENCE SETTINGS (Disabled for maximum performance)
# ======================================================================

# Turn off saving Redis data to disk. This avoids overhead from
# snapshotting (RDB) and ensures maximum throughput by treating Redis
# as an in-memory cache. If the container restarts, all data is lost.
save ""

# Disable append-only file (AOF). AOF provides more durable persistence
# but lowers throughput. I disable it for speed at the cost of data durability.
appendonly no

# Don't stop writes if a background save fails. This is helpful
# in ephemeral environments where I don't strictly care about on-disk data integrity.
stop-writes-on-bgsave-error no

# Disable RDB compression and checksum for better performance
rdbcompression no
rdbchecksum no

# ======================================================================
# MEMORY MANAGEMENT
# ======================================================================

# Set memory limit to prevent Redis from using more than 2GB.
# Increased from 1GB for better caching capacity.
maxmemory 2gb

# When max memory is reached, evict keys using LRU algorithm.
# Changed from noeviction to allkeys-lru for better cache behavior.
maxmemory-policy allkeys-lru

# Number of samples for LRU/LFU eviction algorithm.
# Higher values = more accurate eviction but slightly more CPU usage.
maxmemory-samples 10

# ======================================================================
# LAZY FREEING (Non-blocking deletions for better performance)
# ======================================================================

# Perform DEL, UNLINK, and FLUSHDB operations in a lazy (asynchronous) manner
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes

# ======================================================================
# THREADED I/O (Multi-core performance)
# ======================================================================

# Enable threaded I/O for better multi-core CPU utilization.
# Set to number of cores minus 1, or auto-detect with 4 threads for typical systems.
io-threads 4
io-threads-do-reads yes

# ======================================================================
# NETWORKING
# ======================================================================

# TCP listen() backlog. Higher values allow more pending connections.
tcp-backlog 511

# TCP Keepalive. Helps detect broken clients more quickly.
tcp-keepalive 300

# Timeout for idle clients (0 = disabled). Set to 300 seconds to free resources.
timeout 300

# ======================================================================
# CLIENT OUTPUT BUFFER LIMITS
# ======================================================================

# Limits for normal clients (non-slave, non-pubsub)
# Format: hard-limit soft-limit soft-seconds
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ======================================================================
# ADVANCED SETTINGS
# ======================================================================

# Number of databases. I leave this as 16 by default, but if you expect
# a high number of separate data namespaces, increase or decrease it.
databases 16

# Slowlog to record queries exceeding a threshold.
# The slowlog can help you debug performance bottlenecks.
slowlog-log-slower-than 10000
slowlog-max-len 128

# Logging verbosity. "notice" is a good balance.
# "debug" can clutter the log and impact performance under heavy load.
loglevel notice

# Enable active rehashing for better hash table performance
activerehashing yes

# Disable latency monitoring by default (can be enabled for debugging)
latency-monitor-threshold 0
