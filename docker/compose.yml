name: 'notification-center-dev'

services:
  mariadb:
    image: mariadb:beta
    # Optimized MySQL/MariaDB config for maximum performance
    command: >
      mysqld
      --max-allowed-packet=1G
      --net-read-timeout=10000
      --net-write-timeout=10000
      --wait_timeout=10000
      --interactive_timeout=10000
      --key_buffer_size=256M
      --innodb_buffer_pool_size=4G
      --innodb_buffer_pool_instances=4
      --innodb_log_buffer_size=256M
      --innodb_flush_log_at_trx_commit=2
      --innodb_io_capacity=4000
      --innodb_io_capacity_max=8000
      --innodb_flush_method=O_DIRECT
      --innodb_read_io_threads=8
      --innodb_write_io_threads=8
      --table_open_cache=4096
      --table_open_cache_instances=16
      --max_connections=10000
      --thread_cache_size=100
      --skip-name-resolve
      --skip-log-bin
      --performance_schema=ON
      --innodb_adaptive_hash_index=ON
      --innodb_flush_neighbors=0
      --innodb_change_buffering=all
      --tmp_table_size=256M
      --max_heap_table_size=256M
      --sort_buffer_size=8M
      --read_rnd_buffer_size=4M
      --join_buffer_size=8M
    environment:
      MYSQL_ROOT_PASSWORD: pass123
      MYSQL_DATABASE: notification_center
      MYSQL_USER: notification_center
      MYSQL_PASSWORD: pass123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:8-alpine
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/config.conf:/usr/local/etc/redis/redis.conf
    ports:
      - 6379:6379
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - REDIS_PASSWORD=123456
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mariadb_data:
